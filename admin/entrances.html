<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Entrances</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<div class="dashboard-layout">

  <aside class="sidebar">
   <div class="sidebar-header" style="text-align: center; margin-bottom: 30px;">
            <img src="../logo.png" alt="" style="width: 100px; height: 100px; margin-bottom: 20px;" />
            <h2>StrathMap</h2>
        </div>
    <a href="dashboard.html">Dashboard</a>
    <a href="buildings.html">Buildings</a>
    <a href="floors.html">Floors</a>
    <a href="entrances.html">Entrances</a>
    <a href="categories.html">Categories</a>
    <a href="locations.html">Locations</a>
  </aside>

  <main class="main-content">
    <h1>Manage Entrances</h1>

    <section class="form-card">
      <h2>Add Building Entrance</h2>
      <p class="form-helper">Use entrances for outdoor navigation. Rooms, offices, and other indoor details stay in Locations.</p>

      <form id="entranceForm">
        <label>Building</label>
        <select id="buildingId" required></select>

        <label>Entrance Name</label>
        <input type="text" id="entranceName" placeholder="Main Entrance" required />

        <label>Latitude</label>
        <input type="number" step="any" id="latitude" required />

        <label>Longitude</label>
        <input type="number" step="any" id="longitude" required />

        <label>
          <input type="checkbox" id="isDefault" />
          Default entrance
        </label>

        <label>Status</label>
        <select id="status">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>

        <button type="submit">Add Entrance</button>
        <div id="message" class="message"></div>
      </form>
    </section>

    <section class="table-card">
      <h2>Existing Entrances</h2>

      <table>
        <thead>
          <tr>
            <th>Building</th>
            <th>Entrance</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Default</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="entranceTableBody"></tbody>
      </table>
    </section>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="../assets/js/controllers/EntranceController.js"></script>

</body>
</html>
