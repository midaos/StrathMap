<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StrathMap Admin Login</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <main class="login-page">
    <section class="login-card">
      <div class="login-header" style="text-align: center; margin-bottom: 30px;">
        <img src="../logo.png" alt="" style="width: 100px; height: 100px; margin-bottom: 20px;" />
        <h1>StrathMap Admin</h1>
      </div>
      <p>Login to manage campus locations</p>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required />

        <label>Password</label>
        <input type="password" id="password" required />

        <button type="submit">Login</button>

        <div id="message" class="message"></div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/controllers/LoginController.js"></script>

</body>
</html>
