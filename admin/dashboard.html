<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="dashboard-layout">

    <aside class="sidebar">
        <h2>StrathMap</h2>

        <a href="#">Dashboard</a>
        <a href="buildings.html">Buildings</a>
        <a href="floors.html">Floors</a>
        <a href="entrances.html">Entrances</a>
        <a href="categories.html">Categories</a>
        <a href="locations.html">Locations</a>
    </aside>

    <main class="main-content">

        <h1>Dashboard</h1>

        <div class="stats-grid">

            <div class="stat-card">
                <h3>Total Buildings</h3>
                <p id="buildingCount">0</p>
            </div>

            <div class="stat-card">
                <h3>Total Locations</h3>
                <p id="locationCount">0</p>
            </div>

            <div class="stat-card">
                <h3>Total Searches</h3>
                <p id="searchCount">0</p>
            </div>

            <div class="stat-card">
                <h3>Today's Searches</h3>
                <p id="todayCount">0</p>
            </div>

        </div>

    </main>

</div>
