<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>StrathMap Directory</title>

  <link rel="stylesheet" href="assets/css/styles.css" />
   <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>

<body>

<header class="public-header">
  <div class="header-inner">
    <a href="index.html" class="brand-mark" aria-label="StrathMap campus map">
     <img src="logo.png" alt="" style ="width: 100px; height: 100px; margin-right: 10px;" />
      <span class="brand-copy">
        <strong>Strathmore</strong>
        <small>University Campus Map</small>
      </span>
    </a>

    <div class="header-actions">

      <nav aria-label="Primary navigation">
        <a href="index.html">Map</a>
        <a href="directory.html" class="active">Directory</a>
        <a href="feedback.html?source=directory">Feedback</a>
        <a href="admin/login.html" class="support-link">Admin</a>
      </nav>
    </div>
  </div>
</header>

<main class="public-page">

  <section class="search-section">
    <span class="section-kicker">Campus directory</span>
    <h1>Search for a destination</h1>
    <p>Find classrooms, offices, facilities, and services, then start routing to your destination.</p>

    <form id="directorySearchForm" class="search-form">
      <input
        type="text"
        id="directorySearchInput"
        placeholder="Example: F2-02, Microsoft Auditorium, Finance Office"
        required
      />
      <button type="submit">Search</button>
    </form>
  </section>

  <section id="resultBox"></section>

  <section class="directory-section">
    <div class="directory-section-heading">
      <div>
        <span class="section-kicker">Buildings</span>
        <h2>Browse all destinations</h2>
      </div>
      <div class="directory-tools" aria-label="Directory controls">
        <button id="expandDirectoryBtn" type="button">Expand all</button>
        <button id="collapseDirectoryBtn" type="button">Collapse all</button>
      </div>
    </div>
    <div id="directoryContainer"></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="assets/js/controllers/DirectoryController.js"></script>

</body>
</html>
